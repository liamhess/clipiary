name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      CLIPIARY_RELEASE_REPO: liamhess/clipiary
      CLIPIARY_CASK_TOKEN: clipiary
      CLIPIARY_HOMEPAGE: https://github.com/liamhess/clipiary
      CLIPIARY_DESCRIPTION: macOS clipboard manager with an opt-in global copy-on-select mode
      CLIPIARY_APP_NAME: Clipiary
      CLIPIARY_BUNDLE_ID: dev.liamhess.clipiary
      CLIPIARY_CODESIGN_IDENTITY: ${{ secrets.CLIPIARY_CODESIGN_IDENTITY || secrets.CLIPIARY_DEVELOPER_ID_APPLICATION }}
      CLIPIARY_NOTARY_APPLE_ID: ${{ secrets.CLIPIARY_NOTARY_APPLE_ID }}
      CLIPIARY_NOTARY_TEAM_ID: ${{ secrets.CLIPIARY_NOTARY_TEAM_ID }}
      CLIPIARY_NOTARY_PASSWORD: ${{ secrets.CLIPIARY_NOTARY_PASSWORD }}
      HOMEBREW_TAP_REPOSITORY: liamhess/homebrew-tap
      HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
      CLIPIARY_CODESIGN_P12_BASE64: ${{ secrets.CLIPIARY_CODESIGN_P12_BASE64 || secrets.CLIPIARY_DEVELOPER_ID_P12_BASE64 }}
      CLIPIARY_CODESIGN_P12_PASSWORD: ${{ secrets.CLIPIARY_CODESIGN_P12_PASSWORD || secrets.CLIPIARY_DEVELOPER_ID_P12_PASSWORD }}
      CLIPIARY_KEYCHAIN_PASSWORD: ${{ secrets.CLIPIARY_KEYCHAIN_PASSWORD }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >>"$GITHUB_OUTPUT"
          echo "version=$VERSION" >>"$GITHUB_OUTPUT"

      - name: Select Xcode 26
        shell: bash
        run: |
          set -euo pipefail
          XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort -V | tail -n 1)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 26 installation found on runner." >&2
            ls -1 /Applications | sed 's/^/  /'
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Run release flow
        shell: bash
        run: |
          set -euo pipefail
          export GH_TOKEN="${{ github.token }}"
          python3 tools/clipiary.py ci-release \
            --version "${{ steps.version.outputs.version }}" \
            --build-number "${{ github.run_number }}"
